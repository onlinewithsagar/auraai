<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA // Radium OS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <style>
        :root {
            --bg-pure: #000000;
            --bg-surface: #0a0a0a;
            --bg-elevated: #121212;
            --border-dim: #1f1f1f;
            --border-glow: #2a2a2a;
            
            /* RADIUM ACCENTS */
            --radium: #ccff00;
            --radium-dim: rgba(204, 255, 0, 0.1);
            --radium-glow: rgba(204, 255, 0, 0.3);
            
            /* TEXT */
            --text-main: #f3f4f6;
            --text-muted: #6b7280;
            
            --font-ui: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-pure);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            font-family: var(--font-ui);
            overflow: hidden;
        }

        /* --- 1. CINEMATIC BOOT SEQUENCE --- */
        #bootScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-pure); z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            font-family: var(--font-mono); color: var(--radium);
            transition: opacity 1s ease-out;
            background-image: radial-gradient(circle at 50% 50%, rgba(204, 255, 0, 0.05) 0%, transparent 50%);
        }

        .boot-btn {
            background: transparent; border: 1px solid var(--radium);
            color: var(--radium); padding: 16px 32px; font-size: 1.1rem;
            font-family: var(--font-mono); cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; border-radius: 4px; box-shadow: 0 0 15px var(--radium-glow);
            transition: all 0.3s;
        }
        .boot-btn:hover { background: var(--radium); color: var(--bg-pure); }

        .boot-log {
            margin-top: 30px; font-size: 0.9rem; text-align: left; width: 450px;
            height: 180px; overflow: hidden; display: none; color: var(--text-main);
            text-shadow: 0 0 5px var(--radium-glow); line-height: 1.6;
        }

        /* --- 2. ICON-ONLY RAIL (SIDEBAR) --- */
        .icon-rail {
            width: 72px; background: var(--bg-surface); border-right: 1px solid var(--border-dim);
            display: flex; flex-direction: column; align-items: center; padding: 24px 0; z-index: 10; gap: 24px;
        }

        .sys-logo {
            font-size: 1.5rem; color: var(--radium); text-shadow: 0 0 10px var(--radium-glow);
            margin-bottom: 20px;
        }

        .rail-btn {
            background: transparent; border: 1px solid transparent; color: var(--text-muted);
            width: 44px; height: 44px; border-radius: 8px; cursor: pointer;
            font-size: 1.1rem; display: flex; justify-content: center; align-items: center;
            transition: all 0.2s; position: relative;
        }

        .rail-btn:hover { background: var(--bg-elevated); color: var(--text-main); border-color: var(--border-glow); }
        .rail-btn.active { color: var(--bg-pure); background: var(--radium); box-shadow: 0 0 10px var(--radium-glow); }

        /* Tooltips */
        .rail-btn::after {
            content: attr(data-tooltip); position: absolute; left: 60px;
            background: var(--text-main); color: var(--bg-pure); font-size: 0.75rem;
            padding: 6px 10px; border-radius: 4px; font-weight: 600; font-family: var(--font-mono);
            opacity: 0; pointer-events: none; transform: translateX(-10px);
            transition: opacity 0.2s, transform 0.2s; white-space: nowrap; text-transform: uppercase;
        }
        .rail-btn:hover::after { opacity: 1; transform: translateX(0); }

        .spacer { flex: 1; }

        /* --- 3. MAIN WORKSPACE --- */
        .workspace { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* Header */
        header {
            height: 60px; border-bottom: 1px solid var(--border-dim);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; background: var(--bg-pure);
        }
        .status { font-family: var(--font-mono); font-size: 0.8rem; color: var(--radium); display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 8px; height: 8px; background: var(--radium); border-radius: 50%; box-shadow: 0 0 8px var(--radium); animation: blink 2s infinite; }

        /* Chat Area */
        .chat-area {
            flex: 1; padding: 40px 10%; overflow-y: auto; display: flex; flex-direction: column; gap: 30px;
            scroll-behavior: smooth; background-image: radial-gradient(circle at 50% 50%, var(--radium-dim) 0%, transparent 60%);
        }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border-glow); }
        .chat-area::-webkit-scrollbar-thumb:hover { background: var(--radium); }

        /* Messages */
        .msg-row { display: flex; width: 100%; animation: slideUp 0.3s ease forwards; opacity: 0; transform: translateY(15px); }
        .msg-row.user { justify-content: flex-end; }
        
        .msg-content { padding: 16px 20px; font-size: 1rem; line-height: 1.6; border-radius: 8px; position: relative; max-width: 85%; }

        /* User Bubble */
        .user .msg-content { background: var(--bg-elevated); color: var(--text-main); border: 1px solid var(--border-dim); border-bottom-right-radius: 0; }
        
        /* Bot Bubble */
        .bot-wrapper { display: flex; gap: 16px; width: 100%; max-width: 90%; }
        .bot-icon {
            width: 36px; height: 36px; border-radius: 6px; background: var(--radium-dim); color: var(--radium);
            display: flex; justify-content: center; align-items: center; border: 1px solid var(--radium);
            flex-shrink: 0; font-size: 1rem; box-shadow: 0 0 10px var(--radium-dim);
        }
        .bot .msg-content { flex: 1; padding: 6px 0 0 0; background: transparent; max-width: 100%; }

        /* Markdown Overrides */
        .bot p { margin-bottom: 1.2em; }
        .bot p:last-child { margin-bottom: 0; }
        .bot strong { color: var(--text-main); font-weight: 600; }
        .bot pre {
            background: var(--bg-elevated); border: 1px solid var(--border-dim); padding: 16px;
            border-radius: 8px; overflow-x: auto; margin: 1.2em 0; border-left: 2px solid var(--radium);
        }
        .bot code { font-family: var(--font-mono); font-size: 0.9em; }
        .bot p > code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; color: var(--radium); }

        /* Copy Button */
        .copy-btn {
            position: absolute; top: 12px; right: 12px; background: var(--bg-surface); border: 1px solid var(--border-glow);
            color: var(--text-muted); border-radius: 4px; padding: 6px 12px; font-size: 0.75rem; font-family: var(--font-mono);
            cursor: pointer; opacity: 0; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .bot pre { position: relative; }
        .bot pre:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: var(--radium-dim); color: var(--radium); border-color: var(--radium); }

        /* Input Dock */
        .input-dock { padding: 20px 10% 40px 10%; background: linear-gradient(to top, var(--bg-pure) 60%, transparent 100%); }
        .input-wrapper {
            background: var(--bg-surface); border: 1px solid var(--border-dim); border-radius: 12px;
            padding: 12px 16px; display: flex; align-items: flex-end; gap: 15px; transition: all 0.2s;
        }
        .input-wrapper:focus-within { border-color: var(--radium); box-shadow: 0 0 15px var(--radium-glow); }
        
        textarea {
            flex: 1; background: transparent; border: none; color: var(--text-main); font-size: 1rem;
            resize: none; outline: none; max-height: 200px; min-height: 24px; line-height: 1.5; padding: 4px 0;
            font-family: var(--font-ui);
        }
        textarea::placeholder { color: var(--text-muted); }
        
        .send-btn {
            background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border-dim);
            width: 36px; height: 36px; border-radius: 6px; cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 1rem; transition: all 0.2s; margin-bottom: 2px;
        }
        .send-btn:hover { background: var(--radium); color: var(--bg-pure); border-color: var(--radium); box-shadow: 0 0 10px var(--radium-glow); }

        /* Typing Dots */
        .typing-dots { display: flex; gap: 6px; align-items: center; height: 24px; }
        .dot { width: 6px; height: 6px; background: var(--radium); border-radius: 50%; animation: blink-dot 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; box-shadow: 0 0 0; } }
        @keyframes blink-dot { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.2); } }

    </style>
</head>
<body>

    <div id="bootScreen">
        <button class="boot-btn" id="initBtn">Initialize Radium Uplink</button>
        <div class="boot-log" id="bootLog"></div>
    </div>

    <nav class="icon-rail">
        <div class="sys-logo"><i class="fa-solid fa-layer-group"></i></div>
        
        <div style="width: 30px; height: 1px; background: var(--border-dim); margin: 8px 0;"></div>

        <button class="rail-btn active" data-tooltip="Terminal">
            <i class="fa-solid fa-terminal"></i>
        </button>
        <button class="rail-btn" data-tooltip="New Session" onclick="location.reload()">
            <i class="fa-solid fa-plus"></i>
        </button>
        <button class="rail-btn" data-tooltip="Data Logs">
            <i class="fa-solid fa-database"></i>
        </button>

        <div class="spacer"></div>

        <button class="rail-btn" data-tooltip="Settings">
            <i class="fa-solid fa-sliders"></i>
        </button>
    </nav>

    <main class="workspace">
        <header>
            <div style="font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-muted);">
                AURA // RADIUM_PROTOCOL
            </div>
            <div class="status">
                <div class="status-dot"></div> AUDIO SECURE
            </div>
        </header>

        <div class="chat-area" id="chatArea">
            <div class="msg-row bot">
                <div class="bot-wrapper">
                    <div class="bot-icon"><i class="fa-solid fa-bolt"></i></div>
                    <div class="msg-content">
                        System initialized. Procedural audio active. Ready for input.
                    </div>
                </div>
            </div>
            
            <div class="msg-row bot" id="typingIndicator" style="display: none;">
                <div class="bot-wrapper">
                    <div class="bot-icon"><i class="fa-solid fa-bolt"></i></div>
                    <div class="msg-content">
                        <div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-dock">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Enter parameters..." rows="1" oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        /* ==========================================================================
           1. PROCEDURAL SYNTHETIC AUDIO ENGINE
           ========================================================================== */
        let audioCtx;
        let systemReady = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            systemReady = true;
        }

        function playSynth(type, startFreq, endFreq, duration, vol) {
            if (!audioCtx || !systemReady) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(startFreq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + duration);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // Sound Triggers
        function soundKeystroke() { playSynth('square', 1000, 1500, 0.03, 0.015); }
        function soundSend() { playSynth('sine', 400, 1000, 0.25, 0.05); }
        function soundReceive() { playSynth('triangle', 1200, 600, 0.3, 0.05); }
        function soundError() { playSynth('sawtooth', 200, 50, 0.4, 0.08); }

        /* ==========================================================================
           2. BOOT SEQUENCE LOGIC
           ========================================================================== */
        const initBtn = document.getElementById('initBtn');
        const bootScreen = document.getElementById('bootScreen');
        const bootLog = document.getElementById('bootLog');

        const bootLines = [
            "Decrypting secure channel...",
            "Loading Radium GUI subsystems...",
            "Engaging procedural audio net...",
            "Bypassing firewall constraints...",
            "Audio Context: GRANTED.",
            "Uplink established. Handing over to UI."
        ];

        initBtn.addEventListener('click', async () => {
            initAudio(); 
            playSynth('sine', 200, 800, 0.5, 0.1);
            initBtn.style.display = 'none';
            bootLog.style.display = 'block';

            for (let i = 0; i < bootLines.length; i++) {
                bootLog.innerHTML += `> ${bootLines[i]}<br>`;
                playKeystrokes(bootLines[i].length); 
                await new Promise(r => setTimeout(r, Math.random() * 250 + 100));
            }

            setTimeout(() => {
                playSynth('triangle', 600, 1200, 0.6, 0.15); // Power up
                bootScreen.style.opacity = '0';
                setTimeout(() => {
                    bootScreen.style.display = 'none';
                    document.getElementById('userInput').focus();
                }, 1000);
            }, 500);
        });

        async function playKeystrokes(count) {
            for(let i=0; i<count; i+=3) { 
                soundKeystroke();
                await new Promise(r => setTimeout(r, 20));
            }
        }

        /* ==========================================================================
           3. UI & CHAT LOGIC
           ========================================================================== */
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');
        const sendBtn = document.getElementById('sendBtn');

        // Play sound when typing
        userInput.addEventListener('keydown', (e) => {
            if(e.key !== 'Enter' && e.key !== 'Shift' && e.key !== 'Backspace' && e.key !== 'Control' && e.key !== 'Alt') {
                soundKeystroke();
            }
        });

        // Configure Highlight.js & Marked.js
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            }
        });

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }

        function handleEnter(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function copyCode(btn) {
            const pre = btn.parentElement;
            const code = pre.querySelector('code').innerText;
            navigator.clipboard.writeText(code).then(() => {
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied';
                btn.style.color = 'var(--radium)';
                btn.style.borderColor = 'var(--radium)';
                setTimeout(() => { 
                    btn.innerHTML = originalHtml; 
                    btn.style.color = 'var(--text-muted)';
                    btn.style.borderColor = 'var(--border-glow)';
                }, 2000);
            });
        }

        function appendMessage(sender, text) {
            const rowDiv = document.createElement('div');
            rowDiv.className = `msg-row ${sender}`;
            
            if (sender === 'bot') {
                soundReceive(); // Play success audio on AI reply
                let parsedHTML = marked.parse(text);
                parsedHTML = parsedHTML.replace(/<pre>/g, '<pre><button class="copy-btn" onclick="copyCode(this)"><i class="fa-regular fa-copy"></i> Copy</button>');
                
                rowDiv.innerHTML = `
                    <div class="bot-wrapper">
                        <div class="bot-icon"><i class="fa-solid fa-bolt"></i></div>
                        <div class="msg-content">${parsedHTML}</div>
                    </div>
                `;
            } else {
                rowDiv.innerHTML = `<div class="msg-content">${text}</div>`;
            }
            
            chatArea.insertBefore(rowDiv, typingIndicator);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            soundSend(); // Play transmission sound
            appendMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';
            
            typingIndicator.style.display = 'flex';
            sendBtn.style.pointerEvents = 'none';
            sendBtn.style.opacity = '0.5';
            scrollToBottom();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                
                typingIndicator.style.display = 'none';
                sendBtn.style.pointerEvents = 'auto';
                sendBtn.style.opacity = '1';

                if (data.error) {
                    soundError(); // Play error sound
                    appendMessage('bot', '**SYSTEM ERROR:** ' + data.error);
                } else {
                    appendMessage('bot', data.response);
                }
            } catch (error) {
                soundError(); // Play error sound
                typingIndicator.style.display = 'none';
                sendBtn.style.pointerEvents = 'auto';
                sendBtn.style.opacity = '1';
                appendMessage('bot', '**CONNECTION SEVERED:** Backend offline.');
            }
        }
    </script>
</body>

</html>
